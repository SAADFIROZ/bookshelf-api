apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshelf-api

spec:
  replicas: 4

  selector:
    matchLabels:
      app: bookshelf-api

  template:
    metadata:
      labels:
        app: bookshelf-api

    spec:
      containers:
        - name: bookshelf-api
          image: saad9375/bookshelf-api:v2
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bookshelf-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bookshelf-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bookshelf-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"